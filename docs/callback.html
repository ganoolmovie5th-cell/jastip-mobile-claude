<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jastipin – Login</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #faf6ee; color: #1b2420;
      text-align: center; padding: 20px;
    }
    .logo {
      width: 64px; height: 64px; border-radius: 20px;
      background: #0f5c4a; display: flex;
      align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 16px;
    }
    h2 { margin: 0 0 8px; font-size: 22px; }
    p  { color: #5d6b63; font-size: 15px; }
  </style>
</head>
<body>
  <div class="logo">🧳</div>
  <h2>Jastipin</h2>
  <p id="msg">Menyelesaikan login, mohon tunggu...</p>
  <script>
    (function () {
      var hash   = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var token  = params.get('access_token');
      var state  = params.get('state');
      if (token && state) {
        var dest = decodeURIComponent(state);
        var sep  = dest.indexOf('?') >= 0 ? '&' : '?';
        window.location.href = dest + sep + 'access_token=' + encodeURIComponent(token);
      } else {
        document.getElementById('msg').textContent =
          'Login selesai. Kembali ke aplikasi Jastipin.';
      }
    })();
  </script>
</body>
</html>
